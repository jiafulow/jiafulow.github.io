<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="author" content="{{ site.author.name }}">
    <meta name="description" content="{{ site.description }}">

    <!-- Bootstrap core CSS -->
    <link rel="stylesheet" href="{{ "/assets/css/bootstrap.min.css" | prepend: site.baseurl }}">

    <!-- Custom styles for this template -->
    <link rel="stylesheet" href="{{ "/assets/css/starter-template.css" | prepend: site.baseurl }}">
    <link rel="stylesheet" href="{{ "/assets/css/jekyll-template.css" | prepend: site.baseurl }}">

    <link rel="icon" href="{{ "/assets/favicon.png" | prepend: site.baseurl }}">
</head>
