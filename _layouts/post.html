---
layout: default
---
<div class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <span class="post-meta">
      {% if page.category %} in {{ page.category }} {% endif %}
      on {{ page.date | date: "%b %-d, %Y  %r" }}.
      {% if page.tags.size > 0 %} Tags: {{ page.tags | array_to_sentence_string }}{% endif %}
    </span>
  </header>

  <article class="post-content">
    {{ content }}
  </article>

</div>
