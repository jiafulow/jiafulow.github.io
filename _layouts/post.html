---
layout: default
---
<div class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <span class="post-meta">{{ page.date | date: "%b %-d, %Y  %r" }}{% if page.author %} &middot; {{ page.author }}{% endif %}{% if page.meta %} &middot; {{ page.meta }}{% endif %}</span>
  </header>

  <article class="post-content">
    {{ content }}
  </article>

</div>
