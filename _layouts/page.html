---
layout: default
---
<div class="page">
  <div class="row">
    <div class="col-md-8 col-md-offset-2">

      {% assign post = page %}
      <header class="post-header">
        <h1 class="post-title">{{ post.title }}</h1>
      </header>

      <div class="post-content">
        {{ content }}
      </div>

    </div><!-- /.col-md-8 -->
  </div><!-- /.row -->
</div><!-- /.post -->
